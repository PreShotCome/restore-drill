<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline';"
    />
    <title>Restore Drill</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Restore Drill</h1>
      <p class="tagline">Skeleton ready — build your feature here.</p>
    </header>

    <section class="settings">
      <label>
        Anthropic API key
        <input id="apiKey" type="password" placeholder="sk-ant-..." autocomplete="off" />
      </label>
      <button id="saveKey" type="button">Save key</button>
      <span id="keyStatus" class="key-status"></span>
    </section>

    <p id="status" class="status">Ready.</p>

    <section class="panel">
      <h2>Workspace</h2>
      <p class="placeholder">Add your UI here.</p>
    </section>

    <script src="renderer.js"></script>
  </body>
</html>
